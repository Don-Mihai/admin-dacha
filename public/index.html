<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка — Уткина дача</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>Админка проектов</h1>
    <p class="subtitle">Редактирование public/data и загрузка изображений</p>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h2>Проекты</h2>
        <button type="button" class="btn btn-secondary" id="refreshBtn">Обновить список</button>
        <ul id="projectList" class="tree"></ul>
      </div>
    </aside>

    <section class="editor-panel">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="data">Данные (JSON)</button>
        <button type="button" class="tab" data-tab="upload">Загрузка изображений</button>
      </div>

      <div id="tab-data" class="tab-content active">
        <div class="toolbar">
          <span id="currentFile" class="current-file">Выберите файл слева</span>
          <button type="button" class="btn btn-primary" id="saveBtn" disabled>Сохранить</button>
          <span id="saveStatus" class="status"></span>
        </div>
        <div class="editor-wrap">
          <textarea id="jsonEditor" spellcheck="false" placeholder="Выберите файл в списке проектов"></textarea>
          <pre id="jsonError" class="error-box hidden"></pre>
        </div>
      </div>

      <div id="tab-upload" class="tab-content">
        <form id="uploadForm" class="upload-form">
          <label>
            Проект
            <select id="uploadProject" required>
              <option value="">— выбрать —</option>
            </select>
          </label>
          <label>
            Папка в public (например data/images)
            <input type="text" id="uploadPath" value="data/images" placeholder="data/images" />
          </label>
          <label>
            Файл
            <input type="file" id="uploadFile" accept="image/*,.png,.jpg,.jpeg,.gif,.webp" required />
          </label>
          <button type="submit" class="btn btn-primary">Загрузить</button>
        </form>
        <div id="uploadResult" class="upload-result hidden">
          <p>URL для вставки в данные:</p>
          <div class="url-row">
            <input type="text" id="uploadedUrl" readonly />
            <button type="button" class="btn btn-secondary" id="copyUrlBtn">Копировать</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
